services:
  db:
    image: postgres:latest
    security_opt:
      - seccomp:unconfined
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - ./datos:/datos
      - postgres_data:/var/lib/postgresql
volumes:
  postgres_data:
